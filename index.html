<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unique To-Do List</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#1d2671,
#c33764
);

}

.container{

width:380px;

padding:30px;

border-radius:25px;

background:
rgba(255,255,255,.15);

backdrop-filter:
blur(15px);

box-shadow:
0 20px 50px
rgba(0,0,0,.3);

}

h1{

text-align:center;

margin-bottom:20px;

color:white;

}

.input-box{

display:flex;

gap:10px;

}

input{

flex:1;

padding:14px;

border:none;

border-radius:12px;

outline:none;

}

button{

padding:14px 18px;

border:none;

border-radius:12px;

cursor:pointer;

background:#fff;

font-weight:bold;

transition:.3s;

}

button:hover{

transform:scale(1.05);

}

ul{

list-style:none;

margin-top:20px;

}

li{

display:flex;

justify-content:space-between;

align-items:center;

padding:14px;

margin-bottom:10px;

border-radius:14px;

background:
rgba(255,255,255,.12);

color:white;

cursor:pointer;

transition:.3s;

}

li:hover{

transform:translateX(5px);

}

.done{

text-decoration:line-through;

opacity:.6;

}

.delete{

background:#ff4d6d;

color:white;

padding:8px;

border-radius:8px;

}

</style>

</head>

<body>

<div class="container">

<h1>✨ My Tasks</h1>

<div class="input-box">

<input
id="taskInput"
placeholder="Add new task">

<button onclick="addTask()">
+
</button>

</div>

<ul id="list"></ul>

</div>

<script>

function addTask(){

const input =
document.getElementById(
"taskInput"
);

if(
input.value===""
) return;

const li =
document.createElement(
"li"
);

li.innerHTML=
`
<span>
${input.value}
</span>

<button
class="delete">

✕

</button>
`;

li.onclick=
function(e){

if(
e.target.tagName!=="BUTTON"
){

li.classList.toggle(
"done"
);

}

};

li.querySelector(
".delete"
)

.onclick=

function(){

li.remove();

};

document
.getElementById(
"list"
)

.appendChild(
li
);

input.value="";

}

</script>

</body>

</html>
